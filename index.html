<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Acc Game</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}
header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: #1e293b;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.price {
  color: #22c55e;
  font-size: 20px;
  margin: 10px 0;
}
button {
  background: #22c55e;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

<header>SHOP ACC GAME 🔥</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Acc Free Fire VIP</h3>
    <p>Rank: Cao Thủ | 50 Skin</p>
    <div class="price">200.000đ</div>
    <button onclick="buy()">MUA NGAY</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Acc Roblox Xịn</h3>
    <p>Nhiều gamepass | Level cao</p>
    <div class="price">150.000đ</div>
    <button onclick="buy()">MUA NGAY</button>
  </div>

</div>

<script>
function buy() {
  alert("Liên hệ admin để mua acc!");
}
</script>

</body>
</html>
